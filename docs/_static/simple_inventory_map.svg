  <title
     id="title">Straight fiber deployment with two coupling conditions</title>
  <desc
     id="desc">An interrogator connects through coiled telemetry cable to a 300 meter sensing fiber. The first 200 meters are trenched with a 90 degree bend, and the final 100 meters are loose.</desc>
