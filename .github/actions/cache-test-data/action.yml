name: "Cache Test Data"
description: "Caches DASCore test data using Pooch cache directory"
inputs:
  cache-number:
    description: "Cache number. Use != 1 to reset data cache"
    required: false
    default: "1"
  mode:
    description: "One of restore, save, or restore-save"
    required: false
    default: "restore"
  prime-on-miss:
    description: "If true and mode includes restore, fetch all registered files on cache miss before saving"
    required: false
    default: "false"

outputs:
  cache-hit:
    description: "True if an exact cache key was restored"
    value: ${{ steps.restore-test-data.outputs.cache-hit }}
  cache-key:
    description: "The cache key derived from OS, data version, registry hash, and cache-number"
    value: ${{ env.DATA_CACHE_KEY }}

runs:
  using: "composite"
  steps:
    - name: verify prerequisites
      shell: bash {0}
      run: |
        if ! command -v python &> /dev/null; then
          echo "❌ Error: Python is not installed or not in PATH"
          echo "This action requires Python to be installed first."
          exit 1
        fi
        echo "✅ Prerequisites verified: Python is available"

    - name: get data cache metadata
      shell: bash {0}
      run: |
        python - <<'PY' >> "$GITHUB_ENV"
        import ast
        import os
        import sys
        from hashlib import sha256
        from pathlib import Path

        registry_path = Path("dascore/data_registry.txt")
        constants_path = Path("dascore/constants.py")
        module = ast.parse(constants_path.read_text())

        data_version = None
        for node in module.body:
            if not isinstance(node, ast.Assign):
                continue
            for target in node.targets:
                if isinstance(target, ast.Name) and target.id == "DATA_VERSION":
                    data_version = ast.literal_eval(node.value)
                    break
            if data_version is not None:
                break

        if data_version is None:
            raise RuntimeError("Unable to determine DATA_VERSION from dascore/constants.py")

        home = Path.home()
        if sys.platform == "win32":
            local_app_data = Path(os.environ.get("LOCALAPPDATA", home / "AppData" / "Local"))
            cache_path = local_app_data / "dascore" / "dascore" / "Cache"
        elif sys.platform == "darwin":
            cache_path = home / "Library" / "Caches" / "dascore"
        else:
            cache_root = Path(os.environ.get("XDG_CACHE_HOME", home / ".cache"))
            cache_path = cache_root / "dascore"

        print(f"DATA_REGISTRY_HASH={sha256(registry_path.read_bytes()).hexdigest()}")
        print(f"DATA_CACHE_PATH={cache_path}")
        print(f"DATA_VERSION={data_version}")
        PY

    - name: get data cache key
      shell: bash {0}
      run: |
        echo "DATA_CACHE_KEY=data-${{ runner.os }}-${{ env.DATA_VERSION }}-${{ env.DATA_REGISTRY_HASH }}-${{ inputs.cache-number }}" >> $GITHUB_ENV

    - name: restore test data cache
      if: ${{ inputs.mode == 'restore' || inputs.mode == 'restore-save' }}
      uses: actions/cache/restore@v4
      id: restore-test-data
      with:
        path: ${{ env.DATA_CACHE_PATH }}
        key: ${{ env.DATA_CACHE_KEY }}

    - name: Download all registered test data
      if: ${{ inputs.mode == 'restore-save' && inputs.prime-on-miss == 'true' && steps.restore-test-data.outputs.cache-hit != 'true' }}
      shell: bash {0}
      run: python .github/scripts/cache_test_data.py

    - name: save test data cache
      if: ${{ inputs.mode == 'save' || (inputs.mode == 'restore-save' && (inputs.prime-on-miss != 'true' || steps.restore-test-data.outputs.cache-hit != 'true')) }}
      uses: actions/cache/save@v4
      id: cache-test-data
      with:
        path: ${{ env.DATA_CACHE_PATH }}
        key: ${{ env.DATA_CACHE_KEY }}
