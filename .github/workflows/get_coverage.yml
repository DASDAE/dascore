# Calculates new coverage for the base branch and uploads to codecov
name: Coverage
on:
  push:
    branches:
      - master

jobs:
  prime_test_data_cache:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-shared-vars

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dascore for cache priming
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - uses: ./.github/actions/cache-test-data
        id: cache-test-data
        with:
          mode: restore
          cache-number: 1

      - name: Download all registered test data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        shell: bash
        run: python .github/scripts/cache_test_data.py

      - name: Save primed test data cache
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        uses: ./.github/actions/cache-test-data
        with:
          mode: save
          cache-number: 1

  calc_coverage:
    needs: prime_test_data_cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: "true"
          fetch-depth: '0'

      - uses: ./.github/actions/load-shared-vars

      - uses: ./.github/actions/mamba-install-dascore
        with:
          # Defined in .github/actions/load-shared-vars/action.yml
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache-number: 1

      - name: run test suite
        shell: bash -l {0}
        run: |
          pytest -s --cov dascore --cov-report=xml

      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          flags: unittests # optional
          name: master_tests # optional
          token: ${{ secrets.CODECOV_TOKEN }} # required
