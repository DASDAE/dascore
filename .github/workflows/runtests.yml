# Run full test suite using conda env and all optional deps.
name: TestCode
on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
    paths:
      - 'pyproject.toml'
      - '**.py'
      - '.github/workflows/*.yml'
      - '.github/actions/**/*.yml'

env:
  # used to manually trigger cache reset. Just increment if needed.
  CACHE_NUMBER: 1
  # Ensure matplotlib doesn't try to show figures in CI
  MPLBACKEND: Agg
  QT_QPA_PLATFORM: offscreen

# Cancel previous runs when this one starts.
concurrency:
  group: TestCode-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # Load Python version matrix from shared vars
  setup:
    runs-on: ubuntu-latest
    outputs:
      # Shared values live in .github/actions/load-shared-vars/action.yml
      python-matrix: ${{ steps.load-vars.outputs.python-test-matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/load-shared-vars
        id: load-vars

  # Runs the tests on combinations of the supported python/os matrix.
  prime_test_data_cache:
    needs: setup
    timeout-minutes: 20
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/load-shared-vars

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dascore for cache priming
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      # Prime the full pooch cache once per OS before the test matrix starts so
      # matrix jobs only consume the shared cache instead of racing to create it.
      - uses: ./.github/actions/cache-test-data
        id: cache-test-data
        with:
          mode: restore
          cache-number: ${{ env.CACHE_NUMBER }}

      - name: Download all registered test data
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        shell: bash
        run: python .github/scripts/cache_test_data.py

      - name: Save primed test data cache
        if: steps.cache-test-data.outputs.cache-hit != 'true'
        uses: ./.github/actions/cache-test-data
        with:
          mode: save
          cache-number: ${{ env.CACHE_NUMBER }}

  test_code:
    needs: [setup, prime_test_data_cache]
    timeout-minutes: 25
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Defined in .github/actions/load-shared-vars/action.yml
        python-version: ${{ fromJson(needs.setup.outputs.python-matrix) }}

    # only run if CI isn't turned off
    if: github.event_name == 'push' || !contains(github.event.pull_request.labels.*.name, 'no_ci')

    env:
      # set conda environment file with dependencies
      env_file: 'environment.yml'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: 'true'
          fetch-depth: '0'

      - uses: ./.github/actions/mamba-install-dascore
        with:
          python-version: ${{ matrix.python-version }}
          cache-number: ${{ env.CACHE_NUMBER }}

      # Runs test suite and calculates coverage
      - name: run test suite
        shell: bash -el {0}
        run: ./.github/test_code.sh

      # Runs examples in docstrings
      - name: test docstrings
        shell: bash -el {0}
        run: ./.github/test_code.sh doctest

      # Upload coverage files
      - uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          files: ./coverage.xml
          flags: unittests
          name: PR_tests
          token: ${{ secrets.CODECOV_TOKEN }}
      
            
